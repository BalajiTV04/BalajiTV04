  <!-- ====== SECTION: DATABASES & TOOLS (right side) ====== -->
  <text x="430" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#ff6bcb" font-weight="600" opacity="0.8" letter-spacing="2">DATABASES & TOOLS</text>

  <!-- MongoDB -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="3.6s" repeatCount="indefinite"/>
    <rect x="430" y="55" width="52" height="52" rx="8" fill="none" stroke="#47A248" stroke-width="1.5" opacity="0.8"/>
    <text x="456" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#47A248" font-weight="bold">MDB</text>
    <text x="456" y="96" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="6" fill="#47A248" opacity="0.7">MongoDB</text>
  </g>

  <!-- SQL -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-3;0,0" dur="2.9s" repeatCount="indefinite"/>
    <rect x="492" y="55" width="52" height="52" rx="8" fill="none" stroke="#336791" stroke-width="1.5" opacity="0.8"/>
    <text x="518" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#336791" font-weight="bold">SQL</text>
    <text x="518" y="96" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="6" fill="#336791" opacity="0.7">PostgreSQL</text>
  </g>

  <!-- Git -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-5;0,0" dur="3.3s" repeatCount="indefinite"/>
    <rect x="554" y="55" width="52" height="52" rx="8" fill="none" stroke="#F05032" stroke-width="1.5" opacity="0.8"/>
    <text x="580" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#F05032" font-weight="bold">G</text>
    <text x="580" y="96" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="6" fill="#F05032" opacity="0.7">Git</text>
  </g>

  <!-- VS Code -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-2;0,0" dur="2.7s" repeatCount="indefinite"/>
    <rect x="616" y="55" width="52" height="52" rx="8" fill="none" stroke="#007ACC" stroke-width="1.5" opacity="0.8"/>
    <text x="642" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#007ACC" font-weight="bold">VSC</text>
    <text x="642" y="96" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="6" fill="#007ACC" opacity="0.7">VS Code</text>
  </g>

  <!-- R -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="3.1s" repeatCount="indefinite"/>
    <rect x="678" y="55" width="52" height="52" rx="8" fill="none" stroke="#276DC3" stroke-width="1.5" opacity="0.8"/>
    <text x="704" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#276DC3" font-weight="bold">R</text>
    <text x="704" y="96" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="6" fill="#276DC3" opacity="0.7">R Lang</text>
  </g>

  <!-- ML -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-3;0,0" dur="2.8s" repeatCount="indefinite"/>
    <rect x="430" y="122" width="80" height="28" rx="8" fill="none" stroke="#FF6B6B" stroke-width="1.5" opacity="0.8"/>
    <text x="470" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#FF6B6B" font-weight="bold">ML & AI</text>
  </g>

  <!-- Data Analysis -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="3.5s" repeatCount="indefinite"/>
    <rect x="520" y="122" width="80" height="28" rx="8" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.8"/>
    <text x="560" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#4CAF50" font-weight="bold">Data Anal</text>
  </g>

  <!-- Excel -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-2;0,0" dur="2.6s" repeatCount="indefinite"/>
    <rect x="610" y="122" width="60" height="28" rx="8" fill="none" stroke="#217346" stroke-width="1.5" opacity="0.8"/>
    <text x="640" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#217346" font-weight="bold">Excel</text>
  </g>

  <!-- GitHub -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-3;0,0" dur="3.0s" repeatCount="indefinite"/>
    <rect x="680" y="122" width="52" height="28" rx="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <text x="706" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#ffffff" font-weight="bold" opacity="0.7">GitHub</text>
  </g>

  <!-- Decorative separator -->
  <line x1="405" y1="40" x2="405" y2="145" stroke="#2a2a5e" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

</svg>