  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-2;0,0" dur="2.5s" repeatCount="indefinite"/>
    <rect x="204" y="122" width="52" height="28" rx="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <text x="230" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold" opacity="0.7">Flask</text>
  </g>

  <!-- FastAPI -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0;-4;0,0" dur="3.2s" repeatCount="indefinite"/>
    <rect x="266" y="122" width="52" height="28" rx="8" fill="none" stroke="#009688" stroke-width="1.5" opacity="0.8"/>
    <text x="292" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#009688" font-weight="bold">FAST</text>
