<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e">
        <animate attributeName="stop-color" values="#1a1a2e;#16213e;#0f3460;#1a1a2e" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#16213e">
        <animate attributeName="stop-color" values="#16213e;#0f3460;#1a1a2e;#16213e" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="50%" stop-color="#7b2ff7"/>
      <stop offset="100%" stop-color="#ff6bcb"/>
      <animate attributeName="stop-color" values="#00d2ff;#7b2ff7;#ff6bcb;#00d2ff" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="ringGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b2ff7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6bcb" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="url(#textGrad)" stroke-width="2" opacity="0.9">
    <animate attributeName="r" values="95;98;95" dur="3s" repeatCount="indefinite"/>
  </circle>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite"/>
    <ellipse cx="100" cy="100" rx="82" ry="82" fill="none" stroke="url(#ringGrad1)" stroke-width="2" stroke-dasharray="120 80 60 80">
      <animate attributeName="rx" values="82;85;82" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="82;85;82" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="14s" repeatCount="indefinite"/>
    <ellipse cx="100" cy="100" rx="72" ry="72" fill="none" stroke="url(#ringGrad2)" stroke-width="1.5" stroke-dasharray="60 100 40 100">
      <animate attributeName="rx" values="72;76;72" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="72;76;72" dur="4s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="18s" repeatCount="indefinite"/>
    <circle cx="100" cy="30" r="3" fill="#00d2ff" filter="url(#glow)">
      <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="170" r="2.5" fill="#ff6bcb" filter="url(#glow)">
      <animate attributeName="r" values="2.5;4.5;2.5" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="22s" repeatCount="indefinite"/>
    <circle cx="100" cy="35" r="2" fill="#7b2ff7" filter="url(#glow)">
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <circle cx="60" cy="60" r="1.5" fill="#00d2ff" opacity="0.6">
    <animate attributeName="cx" values="60;55;60;65;60" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;55;60;65;60" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="70" r="1" fill="#ff6bcb" opacity="0.5">
    <animate attributeName="cx" values="140;135;140;145;140" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="70;65;70;75;70" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="130" r="1.2" fill="#7b2ff7" opacity="0.4">
    <animate attributeName="cx" values="50;45;50;55;50" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="145" cy="140" r="1.3" fill="#00d2ff" opacity="0.5">
    <animate attributeName="cx" values="145;140;145;150;145" dur="5.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="45" fill="url(#starGlow)" opacity="0.15">
    <animate attributeName="r" values="45;55;45" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="100" y="95" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="52" font-weight="900" font-style="italic" fill="url(#textGrad)" filter="url(#softGlow)">
    BTV
    <animate attributeName="font-size" values="52;56;52" dur="2.5s" repeatCount="indefinite"/>
  </text>
  <text x="100" y="130" text-anchor="middle" dominant-baseline="middle" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="9" fill="#8888aa" letter-spacing="4" opacity="0.8">
    DEVELOPER
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
  </text>
  <line x1="65" y1="140" x2="135" y2="140" stroke="url(#textGrad)" stroke-width="1.5" stroke-dasharray="5 5">
    <animate attributeName="stroke-dashoffset" values="0;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </line>
  <path d="M 40 40 L 55 40 L 55 45" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 160 40 L 145 40 L 145 45" fill="none" stroke="#ff6bcb" stroke-width="1.5" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 40 160 L 55 160 L 55 155" fill="none" stroke="#7b2ff7" stroke-width="1.5" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 160 160 L 145 160 L 145 155" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </path>
</svg>